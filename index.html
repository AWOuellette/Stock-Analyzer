<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — Stock Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1419;
    --surface2: #141c24;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --text: #e8edf2;
    --muted: #64748b;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }

  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1100px; margin: 0 auto; padding: 0 24px;
  }

  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 0.15em; color: var(--accent); }
  .logo span { color: var(--text); opacity: 0.4; }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.2em; color: var(--muted);
    border: 1px solid var(--border); padding: 6px 12px;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .hero { padding: 72px 0 52px; text-align: center; }

  .eyebrow { font-size: 10px; letter-spacing: 0.35em; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(38px, 6vw, 70px);
    font-weight: 800; line-height: 1.0;
    letter-spacing: -0.02em; margin-bottom: 16px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }

  .hero p { color: var(--muted); font-size: 12px; line-height: 1.8; margin-bottom: 44px; letter-spacing: 0.05em; }

  .search-row { display: flex; gap: 10px; max-width: 560px; margin: 0 auto 20px; }

  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 15px 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500;
    outline: none; letter-spacing: 0.12em; text-transform: uppercase;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { text-transform: none; letter-spacing: normal; color: var(--muted); font-weight: 300; font-size: 13px; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 30px rgba(0,212,170,0.08); }

  .btn-primary {
    background: var(--accent); color: #080c10; border: none;
    padding: 15px 26px; font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-primary:hover:not(:disabled) { background: #00f0c3; box-shadow: 0 6px 24px rgba(0,212,170,0.25); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .quick-picks { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  .qp {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.18s;
  }
  .qp:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.05); }

  .loading-wrap { text-align: center; padding: 60px 0; display: none; }
  .loading-wrap.show { display: block; }

  .loader {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px;

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); }

  .error-box {
    border: 1px solid rgba(239,68,68,0.4); background: rgba(239,68,68,0.06);
    padding: 18px 24px; color: #f87171; font-size: 12px;
    margin-bottom: 24px; display: none; line-height: 1.6;
  }
  .error-box.show { display: block; }

  #results { padding-bottom: 80px; }

  .fade-up { animation: fadeUp 0.45s ease forwards; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width:700px) { .top-grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 22px; }

  .card-tag {
    font-size: 9px; letter-spacing: 0.28em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-tag::after { content:''; flex:1; height:1px; background:var(--border); }

  .ticker-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
  .ticker-sym { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: 0.04em; }
  .ticker-name-sub { font-size: 11px; color: var(--muted); margin-top: 4px; max-width: 160px; line-height: 1.4; }

  .price-block { text-align: right; }
  .price-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .price-chg { font-size: 12px; margin-top: 4px; padding: 3px 9px; display: inline-block; letter-spacing: 0.05em; }
  .price-chg.pos { color: var(--green); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
  .price-chg.neg { color: var(--red); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }

  .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mini-stat { background: var(--surface2); border: 1px solid var(--border); padding: 10px; }
  .ms-label { font-size: 8px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
  .ms-val { font-size: 13px; font-weight: 500; }

  .signals-list { display: flex; flex-direction: column; gap: 14px; }
  .sig-row { display: grid; grid-template-columns: 76px 1fr 56px 52px; align-items: center; gap: 10px; }
  .sig-name { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); }
  .bar-track { height: 3px; background: var(--border); overflow: hidden; }
  .bar-fill { height: 100%; width: 0; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .sig-val { font-size: 11px; text-align: right; }

  .badge { font-size: 8px; letter-spacing: 0.15em; padding: 2px 6px; text-align: center; text-transform: uppercase; }
  .badge.bull { color: var(--green); background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); }
  .badge.bear { color: var(--red); background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); }
  .badge.neut { color: var(--yellow); background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); }

  .rec-banner {
    background: var(--surface); border: 1px solid var(--border);
    padding: 22px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 22px; flex-wrap: wrap;
  }

  .rec-pill {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    letter-spacing: 0.12em; padding: 12px 20px; min-width: 150px;
    text-align: center; flex-shrink: 0;
  }
  .rec-pill.STRONG_BUY  { color: #34d399; background: rgba(52,211,153,0.12); border: 2px solid #34d399; }
  .rec-pill.BUY         { color: var(--green); background: rgba(16,185,129,0.1); border: 2px solid var(--green); }
  .rec-pill.HOLD        { color: var(--yellow); background: rgba(245,158,11,0.1); border: 2px solid var(--yellow); }
  .rec-pill.SELL        { color: var(--red); background: rgba(239,68,68,0.1); border: 2px solid var(--red); }
  .rec-pill.STRONG_SELL { color: #f87171; background: rgba(248,113,113,0.12); border: 2px solid #f87171; }

  .rec-summary { flex: 1; font-size: 12px; color: var(--muted); line-height: 1.8; min-width: 200px; }

  .conf-block { text-align: center; flex-shrink: 0; }
  .conf-num { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; color: var(--accent); line-height: 1; }
  .conf-sub { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-top: 4px; }

  .analysis-card { background: var(--surface); border: 1px solid var(--border); padding: 22px; }
  .analysis-body { font-size: 12px; line-height: 1.9; color: var(--text); }

  .analysis-body h3 {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
    margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .analysis-body h3:first-child { margin-top: 0; }
  .analysis-body p { margin-bottom: 8px; opacity: 0.85; }
  .analysis-body ul { list-style: none; }
  .analysis-body ul li { padding: 4px 0; opacity: 0.85; }
  .analysis-body ul li::before { content: '→ '; color: var(--accent); }

  .targets-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .target-box { flex: 1; min-width: 100px; background: var(--surface2); border: 1px solid var(--border); padding: 12px; text-align: center; }
  .target-label { font-size: 8px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  .target-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .target-val.support { color: var(--yellow); }
  .target-val.tgt     { color: var(--green); }
  .target-val.stop    { color: var(--red); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .score-bar-wrap { margin-bottom: 16px; }
  .score-label-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .score-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 1.4s cubic-bezier(0.4,0,0.2,1); }
</style>

<body>

<header>
  <div class="header-inner">
    <div class="logo">AXIOM<span>.MARKETS</span></div>
    <div class="status-pill"><div class="dot"></div>LIVE DATA · NO API KEY</div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <div class="eyebrow">Real-Time Technical Analysis</div>
    <h1>Market Intelligence<br><em>On Demand</em></h1>
    <p>RSI · MACD · Bollinger Bands · Moving Averages · Momentum<br>
    Calculated live from real Yahoo Finance price data — 100% free</p>

    <div class="search-row">
      <input type="text" id="tickerInput" class="search-input" placeholder="Enter ticker symbol (e.g. AAPL)" maxlength="10" autocomplete="off" />
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">Analyze →</button>
    </div>

    <div class="quick-picks">
      <button class="qp" onclick="quickPick('AAPL')">AAPL</button>
      <button class="qp" onclick="quickPick('NVDA')">NVDA</button>
      <button class="qp" onclick="quickPick('TSLA')">TSLA</button>
      <button class="qp" onclick="quickPick('MSFT')">MSFT</button>
      <button class="qp" onclick="quickPick('AMZN')">AMZN</button>
      <button class="qp" onclick="quickPick('META')">META</button>
      <button class="qp" onclick="quickPick('GOOGL')">GOOGL</button>
      <button class="qp" onclick="quickPick('SPY')">SPY</button>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loader"></div>
    <div class="loading-label" id="loadingLabel">FETCHING PRICE DATA...</div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div id="results"></div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────

document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
function quickPick(t) { document.getElementById('tickerInput').value = t; analyze(); }

function setLoading(msg) { document.getElementById('loadingLabel').textContent = msg; }
function showLoading()   { document.getElementById('loadingWrap').classList.add('show'); }
function hideLoading()   { document.getElementById('loadingWrap').classList.remove('show'); }
function showError(msg)  { const b = document.getElementById('errorBox'); b.textContent = msg; b.classList.add('show'); }
function hideError()     { document.getElementById('errorBox').classList.remove('show'); }

function fmt2(n)  { return n == null || isNaN(n) ? 'N/A' : n.toFixed(2); }
function fmtPct(n){ return n == null || isNaN(n) ? 'N/A' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function fmtBig(n){
  if (n == null || isNaN(n)) return 'N/A';
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2) + 'M';
  return n.toFixed(2);
}

// ── Technical Indicator Math ──────────────────────────────────────────────────

function sma(arr, period) {
  if (arr.length < period) return null;
  return arr.slice(-period).reduce((a, b) => a + b, 0) / period;
}

function ema(arr, period) {
  if (arr.length < period) return null;
  const k = 2 / (period + 1);
  let val = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < arr.length; i++) val = arr[i] * k + val * (1 - k);
  return val;
}

function rsi(arr, period = 14) {
  if (arr.length < period + 1) return null;
  const changes = [];
  for (let i = arr.length - period - 1; i < arr.length - 1; i++) {
    changes.push(arr[i + 1] - arr[i]);
  }
  const gains = changes.map(c => c > 0 ? c : 0);
  const losses = changes.map(c => c < 0 ? Math.abs(c) : 0);
  const avgGain = gains.reduce((a, b) => a + b, 0) / period;
  const avgLoss = losses.reduce((a, b) => a + b, 0) / period;
  if (avgLoss === 0) return 100;
  return 100 - (100 / (1 + avgGain / avgLoss));
}

function macd(arr) {
  const e12 = ema(arr, 12);
  const e26 = ema(arr, 26);
  if (!e12 || !e26) return null;
  return e12 - e26;
}

function bollinger(arr, period = 20) {
  if (arr.length < period) return null;
  const slice = arr.slice(-period);
  const mid = slice.reduce((a, b) => a + b, 0) / period;
  const std = Math.sqrt(slice.reduce((acc, v) => acc + Math.pow(v - mid, 2), 0) / period);
  return { upper: mid + 2 * std, mid, lower: mid - 2 * std, std };
}

function atr(highs, lows, closes, period = 14) {
  const trs = [];
  for (let i = 1; i < closes.length; i++) {
    trs.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i - 1]),
      Math.abs(lows[i] - closes[i - 1])
    ));
  }
  return sma(trs, period);
}

function annualizedVolatility(closes) {
  const rets = [];
  for (let i = 1; i < closes.length; i++) rets.push((closes[i] - closes[i-1]) / closes[i-1]);
  const mean = rets.reduce((a, b) => a + b, 0) / rets.length;
  const variance = rets.reduce((acc, r) => acc + Math.pow(r - mean, 2), 0) / rets.length;
  return Math.sqrt(variance * 252) * 100;
}

// ── Data Fetching ─────────────────────────────────────────────────────────────

async function fetchYahoo(ticker) {
  // Use a public CORS proxy to reach Yahoo Finance
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(yUrl)}`;
  const res = await fetch(proxy);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.chart?.error) throw new Error(json.chart.error.description || 'Ticker not found');
  const result = json.chart?.result?.[0];
  if (!result) throw new Error('No data returned. Check the ticker symbol.');
  return result;
}

async function fetchQuote(ticker) {
  const yUrl = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=price,summaryDetail,defaultKeyStatistics,financialData`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(yUrl)}`;
  try {
    const res = await fetch(proxy);
    const json = await res.json();
    return json.quoteSummary?.result?.[0] || null;
  } catch { return null; }
}

// ── Recommendation Engine ─────────────────────────────────────────────────────

function generateRecommendation(signals) {
  // Score: +2 strong bull, +1 bull, 0 neut, -1 bear, -2 strong bear
  let score = 0;
  let total = 0;

  const w = { rsi: 2, sma50: 2, sma200: 3, macd: 2, boll: 1, pe: 1, momentum: 2 };

  if (signals.rsiSig   !== null) { score += signals.rsiSig   * w.rsi;      total += w.rsi * 2; }
  if (signals.sma50Sig !== null) { score += signals.sma50Sig * w.sma50;    total += w.sma50 * 2; }
  if (signals.sma200Sig!== null) { score += signals.sma200Sig* w.sma200;   total += w.sma200 * 2; }
  if (signals.macdSig  !== null) { score += signals.macdSig  * w.macd;     total += w.macd * 2; }
  if (signals.bollSig  !== null) { score += signals.bollSig  * w.boll;     total += w.boll * 2; }
  if (signals.peSig    !== null) { score += signals.peSig    * w.pe;       total += w.pe * 2; }
  if (signals.momSig   !== null) { score += signals.momSig   * w.momentum; total += w.momentum * 2; }

  const pct = total > 0 ? score / total : 0; // -1 to +1
  const confidence = Math.round(50 + Math.abs(pct) * 40);

  let rec;
  if      (pct >  0.55) rec = 'STRONG_BUY';
  else if (pct >  0.20) rec = 'BUY';
  else if (pct > -0.20) rec = 'HOLD';
  else if (pct > -0.55) rec = 'SELL';
  else                  rec = 'STRONG_SELL';

  return { rec, confidence, score: pct };
}

function sigWord(v) { return v > 0 ? 'bull' : v < 0 ? 'bear' : 'neut'; }

function buildSummary(ticker, signals, rec, price, pe) {
  const { rsiVal, sma50, sma200, macdVal, bollData, currentPrice } = signals;

  const trendDesc = sma50 && sma200
    ? currentPrice > sma50 && currentPrice > sma200
      ? `${ticker} is trading above both its 50-day ($${fmt2(sma50)}) and 200-day ($${fmt2(sma200)}) moving averages, confirming a bullish trend structure.`
      : currentPrice < sma50 && currentPrice < sma200
      ? `${ticker} is trading below both its 50-day ($${fmt2(sma50)}) and 200-day ($${fmt2(sma200)}) moving averages, indicating a bearish trend.`
      : `${ticker} is trading between its 50-day ($${fmt2(sma50)}) and 200-day ($${fmt2(sma200)}) moving averages, suggesting a mixed trend.`
    : `Trend analysis based on available price data.`;

  const rsiDesc = rsiVal != null
    ? rsiVal < 30
      ? `RSI stands at ${fmt2(rsiVal)}, firmly in oversold territory — a classic mean-reversion buy signal.`
      : rsiVal > 70
      ? `RSI at ${fmt2(rsiVal)} signals overbought conditions; momentum may be due for a pullback.`
      : `RSI at ${fmt2(rsiVal)} is neutral, showing neither overbought nor oversold pressure.`
    : '';

  const macdDesc = macdVal != null
    ? macdVal > 0
      ? `MACD is positive (${fmt2(macdVal)}), confirming bullish momentum.`
      : `MACD is negative (${fmt2(macdVal)}), reflecting bearish momentum.`
    : '';

  const bollDesc = bollData
    ? currentPrice > bollData.upper
      ? `Price has broken above the upper Bollinger Band ($${fmt2(bollData.upper)}), suggesting potential overextension.`
      : currentPrice < bollData.lower
      ? `Price is below the lower Bollinger Band ($${fmt2(bollData.lower)}), a mean-reversion opportunity.`
      : `Price sits within the Bollinger Bands (${fmt2(bollData.lower)}–${fmt2(bollData.upper)}), in a normal range.`
    : '';

  const peDesc = pe
    ? pe < 15
      ? `At a P/E of ${fmt2(pe)}, the stock appears undervalued relative to the broader market.`
      : pe > 40
      ? `The elevated P/E of ${fmt2(pe)} prices in high growth expectations, increasing downside risk if growth disappoints.`
      : `P/E ratio of ${fmt2(pe)} is within a reasonable range.`
    : '';

  const recDescs = {
    STRONG_BUY:  'Multiple technical and fundamental signals align bullishly. This setup presents a compelling risk/reward entry.',
    BUY:         'The weight of technical evidence leans positive. Conditions favor initiating or adding to a position.',
    HOLD:        'Signals are mixed. Current holders should stay patient; new entries carry meaningful uncertainty.',
    SELL:        'Technical deterioration warrants reducing exposure. Risk management favors trimming positions.',
    STRONG_SELL: 'Bearish signals dominate across multiple indicators. Significant caution is warranted.'
  };

  return {
    techNote: [trendDesc, rsiDesc, macdDesc, bollDesc].filter(Boolean).join(' '),
    fundNote: peDesc || `Fundamental data is limited. Focus on technical signals for this analysis.`,
    recNote:  recDescs[rec]
  };
}

function priceTargets(closes, atrVal, rec) {
  const price = closes[closes.length - 1];
  const atrMult = { STRONG_BUY: [1.0, 3.0], BUY: [0.8, 2.2], HOLD: [0.7, 1.5], SELL: [0.5, 1.0], STRONG_SELL: [0.4, 0.8] };
  const [stopMult, tgtMult] = atrMult[rec] || [0.8, 2.0];
  const atrSafe = atrVal || price * 0.02;
  return {
    support:  (price - atrSafe * 1.5).toFixed(2),
    target:   (price + atrSafe * tgtMult).toFixed(2),
    stopLoss: (price - atrSafe * stopMult).toFixed(2)
  };
}

// ── Render Helpers ────────────────────────────────────────────────────────────

function sigBarPct(sig) { return sig === 'bull' ? 78 : sig === 'bear' ? 22 : 50; }
function sigCol(sig)    { return sig === 'bull' ? 'var(--green)' : sig === 'bear' ? 'var(--red)' : 'var(--yellow)'; }

function sigRowHtml(name, sig, displayVal) {
  return `<div class="sig-row">
    <div class="sig-name">${name}</div>
    <div class="bar-track"><div class="bar-fill" data-pct="${sigBarPct(sig)}" style="background:${sigCol(sig)}"></div></div>
    <div class="sig-val" style="color:${sigCol(sig)}">${displayVal}</div>
    <span class="badge ${sig}">${sig.toUpperCase()}</span>
  </div>`;
}

function scoreBarHtml(label, score) {
  // score is -1 to +1, map to 0-100%
  const pct = Math.round((score + 1) / 2 * 100);
  const col = pct > 60 ? 'var(--green)' : pct < 40 ? 'var(--red)' : 'var(--yellow)';
  return `<div class="score-bar-wrap">
    <div class="score-label-row"><span>${label}</span><span style="color:${col}">${pct}/100</span></div>
    <div class="score-track"><div class="score-fill" data-pct="${pct}" style="background:${col}"></div></div>
  </div>`;
}

// ── Main Analyze ──────────────────────────────────────────────────────────────

async function analyze() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '';
  hideError();
  setLoading('FETCHING PRICE DATA...');
  showLoading();

  try {
    setLoading('FETCHING PRICE DATA...');
    const [chart, quote] = await Promise.all([fetchYahoo(ticker), fetchQuote(ticker)]);

    setLoading('CALCULATING INDICATORS...');

    // Raw price arrays
    const quotes   = chart.indicators.quote[0];
    const closes   = (quotes.close  || []).filter(Boolean);
    const highs    = (quotes.high   || []).filter(Boolean);
    const lows     = (quotes.low    || []).filter(Boolean);
    const volumes  = (quotes.volume || []).filter(Boolean);
    const meta     = chart.meta;

    if (closes.length < 30) throw new Error('Not enough price history for analysis.');

    const price    = closes[closes.length - 1];
    const prevClose= closes[closes.length - 2];
    const change   = price - prevClose;
    const changePct= (change / prevClose) * 100;

    // Technicals
    const rsiVal   = rsi(closes, 14);
    const sma20    = sma(closes, 20);
    const sma50    = sma(closes, 50);
    const sma200   = sma(closes, Math.min(200, closes.length));
    const ema12    = ema(closes, 12);
    const ema26    = ema(closes, 26);
    const macdVal  = ema12 && ema26 ? ema12 - ema26 : null;
    const bollData = bollinger(closes, 20);
    const atrVal   = atr(highs, lows, closes, 14);
    const vol      = annualizedVolatility(closes.slice(-60));

    // 1-month momentum
    const mom1m    = closes.length >= 21 ? ((price - closes[closes.length - 21]) / closes[closes.length - 21]) * 100 : null;

    // 52-week range
    const yearHigh = meta.fiftyTwoWeekHigh || Math.max(...closes.slice(-252));
    const yearLow  = meta.fiftyTwoWeekLow  || Math.min(...closes.slice(-252));

    // Fundamentals
    const pe       = quote?.summaryDetail?.trailingPE?.raw || null;
    const fwdPE    = quote?.summaryDetail?.forwardPE?.raw  || null;
    const eps      = quote?.defaultKeyStatistics?.trailingEps?.raw || null;
    const mktCap   = quote?.price?.marketCap?.raw  || null;
    const beta     = quote?.summaryDetail?.beta?.raw || null;
    const divYield = quote?.summaryDetail?.dividendYield?.raw || null;
    const margin   = quote?.financialData?.profitMargins?.raw || null;
    const name     = meta.longName || quote?.price?.longName || ticker;
    const shortName= meta.shortName || quote?.price?.shortName || ticker;

    // Signal scoring (-1, 0, +1 or +2/-2 for strong)
    const rsiSig    = rsiVal != null ? (rsiVal < 30 ? 2 : rsiVal < 45 ? 1 : rsiVal > 70 ? -2 : rsiVal > 55 ? -1 : 0) : null;
    const sma50Sig  = sma50  ? (price > sma50  ? 1 : -1) : null;
    const sma200Sig = sma200 ? (price > sma200 ? 1 : -1) : null;
    const macdSig   = macdVal != null ? (macdVal > 0 ? 1 : -1) : null;
    const bollSig   = bollData ? (price < bollData.lower ? 1 : price > bollData.upper ? -1 : 0) : null;
    const peSig     = pe ? (pe < 15 ? 2 : pe < 25 ? 1 : pe > 40 ? -1 : pe > 60 ? -2 : 0) : null;
    const momSig    = mom1m != null ? (mom1m > 5 ? 1 : mom1m < -5 ? -1 : 0) : null;

    const signals = { rsiVal, sma50, sma200, macdVal, bollData, currentPrice: price,
                      rsiSig, sma50Sig, sma200Sig, macdSig, bollSig, peSig, momSig };

    const { rec, confidence, score } = generateRecommendation(signals);
    const { techNote, fundNote, recNote } = buildSummary(ticker, signals, rec, price, pe);
    const targets = priceTargets(closes, atrVal, rec);

    // Convert numeric signals to bull/bear/neut strings for display
    const rsiStr  = sigWord(rsiSig);
    const smaStr  = sma50Sig != null && sma200Sig != null ? sigWord(sma50Sig + sma200Sig) : 'neut';
    const macdStr = sigWord(macdSig);
    const bollStr = sigWord(bollSig);
    const momStr  = sigWord(momSig);

    hideLoading();
    btn.disabled = false;

    // ── Volume trend
    const avgVol20  = sma(volumes, 20);
    const lastVol   = volumes[volumes.length - 1];
    const volRatio  = avgVol20 ? lastVol / avgVol20 : null;
    const volNote   = volRatio != null
      ? volRatio > 1.5 ? `Volume is running ${(volRatio).toFixed(1)}× above its 20-day average — strong conviction behind recent moves.`
      : volRatio < 0.6 ? `Volume is ${(volRatio * 100).toFixed(0)}% of its 20-day average — thin participation, treat signals with caution.`
      : `Volume is near its 20-day average, suggesting normal market participation.`
      : '';

    // ── Risks
    const risks = [];
    if (vol > 50)         risks.push(`High annualized volatility (${vol.toFixed(0)}%) — price swings can be severe.`);
    if (rsiVal > 65)      risks.push(`RSI approaching overbought (${fmt2(rsiVal)}) — momentum reversal risk is elevated.`);
    if (rsiVal < 35)      risks.push(`RSI near oversold (${fmt2(rsiVal)}) — potential for further downside if support breaks.`);
    if (pe && pe > 40)    risks.push(`Elevated P/E (${fmt2(pe)}) leaves little margin for error if earnings disappoint.`);
    if (beta && beta > 1.5) risks.push(`Beta of ${fmt2(beta)} means the stock moves ${fmt2(beta)}× the market — amplified drawdowns in sell-offs.`);
    if (price < sma200)   risks.push(`Price is below the 200-day MA ($${fmt2(sma200)}) — the long-term trend remains bearish.`);
    if (macdVal < 0)      risks.push(`Negative MACD (${fmt2(macdVal)}) signals bearish momentum is currently in control.`);
    while (risks.length < 3) risks.push(['Macro uncertainty and interest rate sensitivity could pressure valuations.',
      'Sector rotation risk: institutional capital may shift away from this industry.',
      'Liquidity risk: lower volume periods can cause wider bid/ask spreads and slippage.',
      'Earnings surprise risk: actual results may diverge from analyst expectations.'][risks.length]);

    const recLabel = rec.replace(/_/g, ' ');

    document.getElementById('results').innerHTML = `
      <div class="top-grid fade-up">
        <div class="card">
          <div class="card-tag">Market Data</div>
          <div class="ticker-row">
            <div>
              <div class="ticker-sym">${ticker}</div>
              <div class="ticker-name-sub">${shortName}</div>
            </div>
            <div class="price-block">
              <div class="price-num">$${fmt2(price)}</div>
              <div class="price-chg ${change >= 0 ? 'pos' : 'neg'}">${change >= 0 ? '+' : ''}${fmt2(change)} (${fmtPct(changePct)})</div>
            </div>
          </div>
          <div class="mini-stats">
            <div class="mini-stat"><div class="ms-label">52W High</div><div class="ms-val">$${fmt2(yearHigh)}</div></div>
            <div class="mini-stat"><div class="ms-label">52W Low</div><div class="ms-val">$${fmt2(yearLow)}</div></div>
            <div class="mini-stat"><div class="ms-label">Volatility</div><div class="ms-val">${vol.toFixed(1)}%</div></div>
            <div class="mini-stat"><div class="ms-label">Market Cap</div><div class="ms-val">${mktCap ? '$'+fmtBig(mktCap) : 'N/A'}</div></div>
            <div class="mini-stat"><div class="ms-label">P/E Ratio</div><div class="ms-val">${pe ? fmt2(pe) : 'N/A'}</div></div>
            <div class="mini-stat"><div class="ms-label">Fwd P/E</div><div class="ms-val">${fwdPE ? fmt2(fwdPE) : 'N/A'}</div></div>
            <div class="mini-stat"><div class="ms-label">EPS</div><div class="ms-val">${eps ? '$'+fmt2(eps) : 'N/A'}</div></div>
            <div class="mini-stat"><div class="ms-label">Beta</div><div class="ms-val">${beta ? fmt2(beta) : 'N/A'}</div></div>
            <div class="mini-stat"><div class="ms-label">Div Yield</div><div class="ms-val">${divYield ? (divYield*100).toFixed(2)+'%' : 'N/A'}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-tag">Technical Signals</div>
          <div class="signals-list">
            ${sigRowHtml('RSI (14)',   rsiStr,  rsiVal != null ? fmt2(rsiVal) : 'N/A')}
            ${sigRowHtml('SMA Trend', smaStr,  sma50 ? '$'+fmt2(sma50) : 'N/A')}
            ${sigRowHtml('MACD',      macdStr, macdVal != null ? fmt2(macdVal) : 'N/A')}
            ${sigRowHtml('Bollinger', bollStr, bollData ? '$'+fmt2(bollData.mid) : 'N/A')}
            ${sigRowHtml('Momentum',  momStr,  mom1m != null ? fmtPct(mom1m)+' 1M' : 'N/A')}
          </div>
          <div class="divider"></div>
          ${scoreBarHtml('Overall Signal Score', score)}
        </div>
      </div>

      <div class="rec-banner fade-up" style="animation-delay:0.1s">
        <div class="rec-pill ${rec}">${recLabel}</div>
        <div class="rec-summary">${recNote}</div>
        <div class="conf-block">
          <div class="conf-num">${confidence}%</div>
          <div class="conf-sub">CONFIDENCE</div>
        </div>
      </div>

      <div class="analysis-card fade-up" style="animation-delay:0.2s">
        <div class="card-tag">Full Analysis</div>
        <div class="analysis-body">
          <h3>Technical Analysis</h3>
          <p>${techNote} ${volNote}</p>

          <h3>Fundamental Analysis</h3>
          <p>${fundNote}</p>
          ${margin ? `<p>Net profit margin of ${(margin*100).toFixed(1)}% reflects the company's bottom-line efficiency.</p>` : ''}

          <h3>Key Risks</h3>
          <ul>${risks.slice(0,3).map(r => `<li>${r}</li>`).join('')}</ul>

          <h3>Price Targets</h3>
          <div class="targets-row">
            <div class="target-box">
              <div class="target-label">Support Level</div>
              <div class="target-val support">$${targets.support}</div>
            </div>
            <div class="target-box">
              <div class="target-label">Price Target</div>
              <div class="target-val tgt">$${targets.target}</div>
            </div>
            <div class="target-box">
              <div class="target-label">Stop Loss</div>
              <div class="target-val stop">$${targets.stopLoss}</div>
            </div>
          </div>

          <div class="divider"></div>
          <p style="color:var(--muted);font-size:10px;letter-spacing:0.04em;opacity:1">
            ⚠ Price data via Yahoo Finance. Indicators calculated in real-time. For informational purposes only — not financial advice. Always conduct your own due diligence before investing.
          </p>
        </div>
      </div>
    `;

    // Animate bars
    requestAnimationFrame(() => setTimeout(() => {
      document.querySelectorAll('.bar-fill, .score-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 80));

  } catch (err) {
    hideLoading();
    btn.disabled = false;
    showError('Error: ' + err.message);
    console.error(err);
  }
}
</script>
</body>
</html>
