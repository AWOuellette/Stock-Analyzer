<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — Stock Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1419;
    --surface2: #141c24;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --text: #e8edf2;
    --muted: #64748b;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  .logo span { color: var(--text); opacity: 0.4; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 12px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .hero { padding: 72px 0 52px; text-align: center; }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(38px, 6vw, 70px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero h1 em { font-style: normal; color: var(--accent); }

  .hero p {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
    margin-bottom: 44px;
    letter-spacing: 0.05em;
  }

  .search-row {
    display: flex;
    gap: 10px;
    max-width: 560px;
    margin: 0 auto 20px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 15px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { text-transform: none; letter-spacing: normal; color: var(--muted); font-weight: 300; font-size: 13px; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 30px rgba(0,212,170,0.08); }

  .btn-primary {
    background: var(--accent);
    color: #080c10;
    border: none;
    padding: 15px 26px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover:not(:disabled) { background: #00f0c3; box-shadow: 0 6px 24px rgba(0,212,170,0.25); transform: translateY(-1px); }
  .btn-primary:active { transform: none; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  .quick-picks { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  .qp {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.18s;
  }

  .qp:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.05); }

  .loading-wrap { text-align: center; padding: 60px 0; display: none; }
  .loading-wrap.show { display: block; }

  .loader {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-label { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 28px; }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 340px;
    margin: 0 auto;
    text-align: left;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0.3;
    transition: opacity 0.4s, color 0.4s;
  }

  .step.active { opacity: 1; color: var(--text); }
  .step.done   { opacity: 0.6; color: var(--green); }

  .step-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 9px;
  }

  .step.active .step-icon { border-color: var(--accent); color: var(--accent); animation: stepPulse 1s infinite; }
  .step.done   .step-icon { border-color: var(--green); background: rgba(16,185,129,0.1); }

  @keyframes stepPulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0.4);} 50%{box-shadow:0 0 0 4px rgba(0,212,170,0);} }

  .loading-eta {
    margin-top: 22px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    opacity: 0.6;
  }

  .error-box {
    border: 1px solid rgba(239,68,68,0.4);
    background: rgba(239,68,68,0.06);
    padding: 18px 24px;
    color: #f87171;
    font-size: 12px;
    margin-bottom: 24px;
    display: none;
    line-height: 1.6;
  }
  .error-box.show { display: block; }

  #results { padding-bottom: 80px; }

  .fade-up { animation: fadeUp 0.45s ease forwards; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media(max-width:700px) { .top-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px;
  }

  .card-tag {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-tag::after { content:''; flex:1; height:1px; background:var(--border); }

  .ticker-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }

  .ticker-sym { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: 0.04em; }
  .ticker-name-sub { font-size: 11px; color: var(--muted); margin-top: 4px; max-width: 160px; line-height: 1.4; }

  .price-block { text-align: right; }
  .price-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }

  .price-chg {
    font-size: 12px;
    margin-top: 4px;
    padding: 3px 9px;
    display: inline-block;
    letter-spacing: 0.05em;
  }
  .price-chg.pos { color: var(--green); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
  .price-chg.neg { color: var(--red); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
  .price-chg.neu { color: var(--muted); background: rgba(100,116,139,0.1); border: 1px solid var(--border); }

  .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .mini-stat { background: var(--surface2); border: 1px solid var(--border); padding: 10px; }
  .ms-label { font-size: 8px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
  .ms-val { font-size: 13px; font-weight: 500; }

  .signals-list { display: flex; flex-direction: column; gap: 11px; }

  .sig-row { display: grid; grid-template-columns: 72px 1fr 56px 52px; align-items: center; gap: 10px; }
  .sig-name { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); }

  .bar-track { height: 3px; background: var(--border); overflow: hidden; }
  .bar-fill { height: 100%; width: 0; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }

  .sig-val { font-size: 11px; text-align: right; }

  .badge { font-size: 8px; letter-spacing: 0.15em; padding: 2px 6px; text-align: center; text-transform: uppercase; }
  .badge.bull { color: var(--green); background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); }
  .badge.bear { color: var(--red); background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); }
  .badge.neut { color: var(--yellow); background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); }

  .rec-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 22px;
    flex-wrap: wrap;
  }

  .rec-pill {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.15em;
    padding: 12px 20px;
    min-width: 150px;
    text-align: center;
    flex-shrink: 0;
  }

  .rec-pill.STRONG_BUY  { color: #34d399; background: rgba(52,211,153,0.12); border: 2px solid #34d399; }
  .rec-pill.BUY         { color: var(--green); background: rgba(16,185,129,0.1); border: 2px solid var(--green); }
  .rec-pill.HOLD        { color: var(--yellow); background: rgba(245,158,11,0.1); border: 2px solid var(--yellow); }
  .rec-pill.SELL        { color: var(--red); background: rgba(239,68,68,0.1); border: 2px solid var(--red); }
  .rec-pill.STRONG_SELL { color: #f87171; background: rgba(248,113,113,0.12); border: 2px solid #f87171; }

  .rec-summary { flex: 1; font-size: 12px; color: var(--muted); line-height: 1.8; min-width: 200px; }

  .conf-block { text-align: center; flex-shrink: 0; }
  .conf-num { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; color: var(--accent); line-height: 1; }
  .conf-sub { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-top: 4px; }

  .analysis-card { background: var(--surface); border: 1px solid var(--border); padding: 22px; }

  .analysis-body { font-size: 12px; line-height: 1.9; color: var(--text); }

  .analysis-body h3 {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 20px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .analysis-body h3:first-child { margin-top: 0; }

  .analysis-body p { margin-bottom: 8px; opacity: 0.85; }
  .analysis-body ul { list-style: none; }
  .analysis-body ul li { padding: 4px 0; opacity: 0.85; }
  .analysis-body ul li::before { content: '→ '; color: var(--accent); }

  .targets-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }

  .target-box { flex: 1; min-width: 100px; background: var(--surface2); border: 1px solid var(--border); padding: 12px; text-align: center; }
  .target-label { font-size: 8px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  .target-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .target-val.support { color: var(--yellow); }
  .target-val.tgt     { color: var(--green); }
  .target-val.stop    { color: var(--red); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">AXIOM<span>.MARKETS</span></div>
    <div class="status-pill"><div class="dot"></div>AI-POWERED · LIVE DATA</div>
  </div>
</header>

<div class="container">

  <div class="hero">
    <div class="eyebrow">Real-Time AI Stock Analysis</div>
    <h1>Market Intelligence<br><em>On Demand</em></h1>
    <p>RSI · MACD · Moving Averages · Bollinger Bands · Fundamentals<br>Claude searches live market data &amp; delivers institutional-grade analysis</p>

    <div class="search-row">
      <input type="text" id="tickerInput" class="search-input" placeholder="Enter ticker symbol (e.g. AAPL)" maxlength="10" autocomplete="off" />
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">Analyze →</button>
    </div>

    <div class="quick-picks">
      <button class="qp" onclick="quickPick('AAPL')">AAPL</button>
      <button class="qp" onclick="quickPick('NVDA')">NVDA</button>
      <button class="qp" onclick="quickPick('TSLA')">TSLA</button>
      <button class="qp" onclick="quickPick('MSFT')">MSFT</button>
      <button class="qp" onclick="quickPick('AMZN')">AMZN</button>
      <button class="qp" onclick="quickPick('META')">META</button>
      <button class="qp" onclick="quickPick('GOOGL')">GOOGL</button>
      <button class="qp" onclick="quickPick('SPY')">SPY</button>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loader"></div>
    <div class="loading-label" id="loadingLabel">SEARCHING LIVE MARKET DATA...</div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div id="results"></div>

</div>

<script>
document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

function quickPick(t) {
  document.getElementById('tickerInput').value = t;
  analyze();
}

async function callAPI(body) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `API error ${resp.status}`);
  }
  return await resp.json();
}

async function analyze() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;

  const btn       = document.getElementById('analyzeBtn');
  const results   = document.getElementById('results');
  const errorBox  = document.getElementById('errorBox');
  const loadWrap  = document.getElementById('loadingWrap');
  const loadLabel = document.getElementById('loadingLabel');

  btn.disabled = true;
  results.innerHTML = '';
  errorBox.classList.remove('show');
  loadLabel.textContent = 'SEARCHING LIVE MARKET DATA...';
  loadWrap.classList.add('show');

  // Cycle loading messages so user knows it's working
  const messages = [
    'ANALYZING FUNDAMENTALS...',
    'CALCULATING TECHNICAL SIGNALS...',
    'EVALUATING RISK FACTORS...',
    'BUILDING RECOMMENDATION...',
    'ALMOST DONE...'
  ];
  let msgIdx = 0;
  const msgTimer = setInterval(() => {
    msgIdx = (msgIdx + 1) % messages.length;
    loadLabel.textContent = messages[msgIdx];
  }, 4000);

  const prompt = `You are a stock analyst with deep knowledge of public markets. Analyze the stock ${ticker} using your training knowledge and reply ONLY with the block below — no other text.

---START---
TICKER: ${ticker}
COMPANY: [full company name]
PRICE: [last known price as a number]
CHANGE: [typical recent daily change, e.g. +1.23 (+0.65%)]
CHANGE_DIR: [pos or neg]
HIGH_52W: [approximate 52-week high]
LOW_52W: [approximate 52-week low]
MARKET_CAP: [e.g. 2.94T or 845B]
PE_RATIO: [number or N/A]
FORWARD_PE: [number or N/A]
EPS: [number or N/A]
BETA: [number or N/A]
DIV_YIELD: [e.g. 0.52% or N/A]
PROFIT_MARGIN: [e.g. 26.4% or N/A]
RSI_VAL: [typical RSI as a number]
RSI_SIG: [BULL if <40, BEAR if >70, else NEUT]
SMA_SIG: [BULL/BEAR/NEUT]
MACD_SIG: [BULL/BEAR/NEUT]
BOLL_SIG: [BULL/BEAR/NEUT]
TREND_SIG: [BULL/BEAR/NEUT]
RECOMMENDATION: [STRONG_BUY/BUY/HOLD/SELL/STRONG_SELL]
CONFIDENCE: [50-95]
SUMMARY: [2 sentences justifying the recommendation]
SUPPORT: [$XX.XX]
TARGET: [$XX.XX]
STOP_LOSS: [$XX.XX]
TECH_NOTE: [3 sentences on RSI, moving averages, momentum]
FUND_NOTE: [3 sentences on valuation, growth, profitability]
RISK1: [specific risk]
RISK2: [specific risk]
RISK3: [specific risk]
ANALYST_NOTE: [2 sentences on analyst consensus and price targets]
---END---`;

  try {
    const data = await callAPI({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 900,
      messages: [{ role: 'user', content: prompt }]
    });

    clearInterval(msgTimer);

    const fullText = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    loadWrap.classList.remove('show');
    btn.disabled = false;

    const startIdx = fullText.indexOf('---START---');
    const endIdx   = fullText.indexOf('---END---');
    if (startIdx === -1 || endIdx === -1) {
      throw new Error('Could not parse the response. Please try again.');
    }

    const block = fullText.slice(startIdx + 11, endIdx).trim();

    function gf(key) {
      const m = block.match(new RegExp(`^${key}:\\s*(.+)$`, 'm'));
      return m ? m[1].trim() : 'N/A';
    }

    const tk       = gf('TICKER');
    const company  = gf('COMPANY');
    const price    = gf('PRICE');
    const change   = gf('CHANGE');
    const chgDir   = gf('CHANGE_DIR');
    const hi52     = gf('HIGH_52W');
    const lo52     = gf('LOW_52W');
    const mktCap   = gf('MARKET_CAP');
    const pe       = gf('PE_RATIO');
    const fwdPE    = gf('FORWARD_PE');
    const eps      = gf('EPS');
    const beta     = gf('BETA');
    const divY     = gf('DIV_YIELD');
    const margin   = gf('PROFIT_MARGIN');
    const rsiVal   = gf('RSI_VAL');
    const rsiSig   = gf('RSI_SIG').toLowerCase();
    const smaSig   = gf('SMA_SIG').toLowerCase();
    const macdSig  = gf('MACD_SIG').toLowerCase();
    const bollSig  = gf('BOLL_SIG').toLowerCase();
    const trendSig = gf('TREND_SIG').toLowerCase();
    const rec      = gf('RECOMMENDATION').replace(/ /g,'_');
    const conf     = gf('CONFIDENCE');
    const summary  = gf('SUMMARY');
    const support  = gf('SUPPORT');
    const target   = gf('TARGET');
    const stopLoss = gf('STOP_LOSS');
    const techNote = gf('TECH_NOTE');
    const fundNote = gf('FUND_NOTE');
    const risk1    = gf('RISK1');
    const risk2    = gf('RISK2');
    const risk3    = gf('RISK3');
    const analNote = gf('ANALYST_NOTE');

    function sigBarPct(sig) { return sig === 'bull' ? 78 : sig === 'bear' ? 22 : 50; }
    function sigCol(sig)    { return sig === 'bull' ? 'var(--green)' : sig === 'bear' ? 'var(--red)' : 'var(--yellow)'; }
    function badgeHtml(sig) {
      const label = sig === 'bull' ? 'BULL' : sig === 'bear' ? 'BEAR' : 'NEUT';
      return `<span class="badge ${sig}">${label}</span>`;
    }
    function sigRow(name, sig, displayVal) {
      return `<div class="sig-row">
        <div class="sig-name">${name}</div>
        <div class="bar-track"><div class="bar-fill" data-pct="${sigBarPct(sig)}" style="background:${sigCol(sig)}"></div></div>
        <div class="sig-val" style="color:${sigCol(sig)}">${displayVal}</div>
        ${badgeHtml(sig)}
      </div>`;
    }

    const recLabel = rec.replace(/_/g,' ');
    const epsDisplay = (eps !== 'N/A' && !eps.startsWith('$')) ? '$' + eps : eps;

    results.innerHTML = `
      <div class="top-grid fade-up">
        <div class="card">
          <div class="card-tag">Market Data</div>
          <div class="ticker-row">
            <div>
              <div class="ticker-sym">${tk}</div>
              <div class="ticker-name-sub">${company}</div>
            </div>
            <div class="price-block">
              <div class="price-num">$${price}</div>
              <div class="price-chg ${chgDir}">${change}</div>
            </div>
          </div>
          <div class="mini-stats">
            <div class="mini-stat"><div class="ms-label">52W High</div><div class="ms-val">$${hi52}</div></div>
            <div class="mini-stat"><div class="ms-label">52W Low</div><div class="ms-val">$${lo52}</div></div>
            <div class="mini-stat"><div class="ms-label">Mkt Cap</div><div class="ms-val">${mktCap}</div></div>
            <div class="mini-stat"><div class="ms-label">P/E Ratio</div><div class="ms-val">${pe}</div></div>
            <div class="mini-stat"><div class="ms-label">Fwd P/E</div><div class="ms-val">${fwdPE}</div></div>
            <div class="mini-stat"><div class="ms-label">EPS (TTM)</div><div class="ms-val">${epsDisplay}</div></div>
            <div class="mini-stat"><div class="ms-label">Beta</div><div class="ms-val">${beta}</div></div>
            <div class="mini-stat"><div class="ms-label">Div Yield</div><div class="ms-val">${divY}</div></div>
            <div class="mini-stat"><div class="ms-label">Net Margin</div><div class="ms-val">${margin}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-tag">Technical Signals</div>
          <div class="signals-list">
            ${sigRow('RSI (14)', rsiSig, rsiVal)}
            ${sigRow('SMA Trend', smaSig, smaSig.toUpperCase())}
            ${sigRow('MACD', macdSig, macdSig.toUpperCase())}
            ${sigRow('Bollinger', bollSig, bollSig.toUpperCase())}
            ${sigRow('Momentum', trendSig, trendSig.toUpperCase())}
          </div>
        </div>
      </div>

      <div class="rec-banner fade-up" style="animation-delay:0.1s">
        <div class="rec-pill ${rec}">${recLabel}</div>
        <div class="rec-summary">${summary}</div>
        <div class="conf-block">
          <div class="conf-num">${conf}%</div>
          <div class="conf-sub">CONFIDENCE</div>
        </div>
      </div>

      <div class="analysis-card fade-up" style="animation-delay:0.2s">
        <div class="card-tag">Full Analysis</div>
        <div class="analysis-body">
          <h3>Technical Analysis</h3>
          <p>${techNote}</p>

          <h3>Fundamental Analysis</h3>
          <p>${fundNote}</p>

          <h3>Key Risks</h3>
          <ul>
            <li>${risk1}</li>
            <li>${risk2}</li>
            <li>${risk3}</li>
          </ul>

          <h3>Analyst Consensus</h3>
          <p>${analNote}</p>

          <h3>Price Targets</h3>
          <div class="targets-row">
            <div class="target-box">
              <div class="target-label">Support Level</div>
              <div class="target-val support">${support}</div>
            </div>
            <div class="target-box">
              <div class="target-label">Price Target</div>
              <div class="target-val tgt">${target}</div>
            </div>
            <div class="target-box">
              <div class="target-label">Stop Loss</div>
              <div class="target-val stop">${stopLoss}</div>
            </div>
          </div>

          <div class="divider"></div>
          <p style="color:var(--muted);font-size:10px;letter-spacing:0.04em;opacity:1">
            ⚠ Data is based on AI training knowledge and may not reflect current prices. For informational purposes only — not financial advice. Always verify with a live source before making investment decisions.
          </p>
        </div>
      </div>
    `;

    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 100);
    });

  } catch (err) {
    clearInterval(msgTimer);
    loadWrap.classList.remove('show');
    btn.disabled = false;
    errorBox.textContent = 'Error: ' + err.message;
    errorBox.classList.add('show');
    console.error(err);
  }
}
</script>

</body>
</html>
